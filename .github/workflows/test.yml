name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # 1) 실제 저장소 구조 확인 (디버그)
      - name: List repository files
        run: |
          echo "===== 작업 디렉토리: $(pwd) ====="
          ls -alF
          echo "===== 전체 파일 트리 (.git 제외) ====="
          find . -path ./.git -prune -o -print | sort

      - name: Run a one-line script
        run: echo Hello, world!

      # 2) 소스 파일 업로드 — 위치 무관하게 확장자로 탐색
      - name: Upload source files
        uses: actions/upload-artifact@v6
        with:
          name: source-files
          path: |
            **/*.java
            **/*.py
            **/*.js
            **/*.ts
            **/*.gradle
            **/pom.xml
          if-no-files-found: ignore   # 없어도 경고 없이 스킵
          retention-days: 30

      # 3) 리소스 파일 업로드 — 위치 무관하게 확장자로 탐색
      - name: Upload resource files
        uses: actions/upload-artifact@v6
        with:
          name: resource-files
          path: |
            **/resources/**
            **/*.properties
            **/*.yml
            **/*.yaml
            **/*.json
            **/*.xml
          if-no-files-found: ignore
          retention-days: 30

      # 4) 위 패턴에 안 걸려도 전체 저장소를 통째로 업로드 (항상 성공)
      - name: Upload full repository (fallback)
        uses: actions/upload-artifact@v6
        with:
          name: full-repository
          path: .
          include-hidden-files: false   # .git 등 숨김 디렉토리 제외
          if-no-files-found: error
          retention-days: 30
