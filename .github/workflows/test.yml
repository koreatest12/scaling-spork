name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ── 1. 체크아웃 (최신 v6) ──
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── 2. JDK 설정 (최신 setup-java v5, Java 21 LTS, 캐시는 pom.xml 생성 후 따로 켬) ──
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── 3. Maven 프로젝트 디렉토리 구조 대량 생성 ──
      - name: Create Maven directory layout
        run: |
          mkdir -p src/main/java/com/example
          mkdir -p src/main/java/com/example/mcp
          mkdir -p src/main/java/com/example/mcp/tools
          mkdir -p src/main/resources
          mkdir -p src/test/java/com/example
          echo "생성된 디렉토리 구조:"
          find src -type d | sort

      # ── 4. pom.xml (Maven 빌드 파일) 생성 ──
      - name: Generate pom.xml
        run: |
          cat > pom.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>

            <groupId>com.example</groupId>
            <artifactId>scaling-spork</artifactId>
            <version>1.0.0</version>
            <packaging>jar</packaging>

            <properties>
              <maven.compiler.release>21</maven.compiler.release>
              <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>
              <jackson.version>2.17.1</jackson.version>
              <junit.version>5.10.2</junit.version>
            </properties>

            <dependencies>
              <dependency>
                <groupId>com.fasterxml.jackson.core</groupId>
                <artifactId>jackson-databind</artifactId>
                <version>${jackson.version}</version>
              </dependency>
              <dependency>
                <groupId>org.junit.jupiter</groupId>
                <artifactId>junit-jupiter</artifactId>
                <version>${junit.version}</version>
                <scope>test</scope>
              </dependency>
            </dependencies>

            <build>
              <finalName>scaling-spork</finalName>
              <plugins>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-compiler-plugin</artifactId>
                  <version>3.13.0</version>
                </plugin>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-surefire-plugin</artifactId>
                  <version>3.2.5</version>
                </plugin>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-shade-plugin</artifactId>
                  <version>3.5.3</version>
                  <executions>
                    <execution>
                      <phase>package</phase>
                      <goals><goal>shade</goal></goals>
                      <configuration>
                        <createDependencyReducedPom>false</createDependencyReducedPom>
                        <transformers>
                          <!-- 실행 진입점(Main-Class) 지정 -->
                          <transformer implementation="org.apache.maven.plugins.shade.resource.ManifestResourceTransformer">
                            <mainClass>com.example.App</mainClass>
                          </transformer>
                          <!-- LICENSE/NOTICE 등 메타 파일 병합 -->
                          <transformer implementation="org.apache.maven.plugins.shade.resource.ApacheLicenseResourceTransformer"/>
                          <transformer implementation="org.apache.maven.plugins.shade.resource.ApacheNoticeResourceTransformer"/>
                          <!-- 서비스 디스크립터 병합(여러 SPI 대비) -->
                          <transformer implementation="org.apache.maven.plugins.shade.resource.ServicesResourceTransformer"/>
                        </transformers>
                        <filters>
                          <filter>
                            <artifact>*:*</artifact>
                            <excludes>
                              <!-- 중복 module-info 및 서명/메타 충돌 파일 제외 -->
                              <exclude>module-info.class</exclude>
                              <exclude>META-INF/versions/*/module-info.class</exclude>
                              <exclude>META-INF/*.SF</exclude>
                              <exclude>META-INF/*.DSA</exclude>
                              <exclude>META-INF/*.RSA</exclude>
                              <exclude>META-INF/MANIFEST.MF</exclude>
                            </excludes>
                          </filter>
                        </filters>
                      </configuration>
                    </execution>
                  </executions>
                </plugin>
              </plugins>
            </build>
          </project>
          EOF
          echo "pom.xml 생성 완료" && head -n 12 pom.xml

      # ── 5. 자바 소스 파일 대량 생성 (App / Util) ──
      - name: Generate application sources
        run: |
          cat > src/main/java/com/example/App.java << 'EOF'
          package com.example;

          public class App {
              public static void main(String[] args) {
                  String buildNo = System.getenv().getOrDefault("BUILD_NO", "local");
                  System.out.println("Hello from CI build #" + buildNo);
                  System.out.println("Now: " + Util.now());
              }
          }
          EOF

          cat > src/main/java/com/example/Util.java << 'EOF'
          package com.example;

          import java.time.LocalDateTime;

          public final class Util {
              private Util() {}
              public static String now() {
                  return LocalDateTime.now().toString();
              }
          }
          EOF
          echo "App.java, Util.java 생성 완료"

      # ── 6. MCP 서버 코드 대량 생성 (서버 본체 + 툴 인터페이스 + 툴 2종) ──
      - name: Generate MCP server sources
        run: |
          cat > src/main/java/com/example/mcp/tools/Tool.java << 'EOF'
          package com.example.mcp.tools;

          import com.fasterxml.jackson.databind.JsonNode;

          public interface Tool {
              String name();
              String description();
              String call(JsonNode arguments);
          }
          EOF

          cat > src/main/java/com/example/mcp/tools/EchoTool.java << 'EOF'
          package com.example.mcp.tools;

          import com.fasterxml.jackson.databind.JsonNode;

          public class EchoTool implements Tool {
              @Override public String name() { return "echo"; }
              @Override public String description() { return "Echoes back the provided message."; }
              @Override public String call(JsonNode arguments) {
                  return "Echo: " + arguments.path("message").asText("");
              }
          }
          EOF

          cat > src/main/java/com/example/mcp/tools/TimeTool.java << 'EOF'
          package com.example.mcp.tools;

          import com.fasterxml.jackson.databind.JsonNode;
          import java.time.LocalDateTime;

          public class TimeTool implements Tool {
              @Override public String name() { return "time"; }
              @Override public String description() { return "Returns the current server time."; }
              @Override public String call(JsonNode arguments) {
                  return "Current time: " + LocalDateTime.now();
              }
          }
          EOF

          cat > src/main/java/com/example/mcp/McpServer.java << 'EOF'
          package com.example.mcp;

          import com.example.mcp.tools.EchoTool;
          import com.example.mcp.tools.TimeTool;
          import com.example.mcp.tools.Tool;
          import com.fasterxml.jackson.databind.JsonNode;
          import com.fasterxml.jackson.databind.ObjectMapper;
          import com.fasterxml.jackson.databind.node.ArrayNode;
          import com.fasterxml.jackson.databind.node.ObjectNode;

          import java.io.BufferedReader;
          import java.io.InputStreamReader;
          import java.io.PrintStream;
          import java.nio.charset.StandardCharsets;
          import java.util.LinkedHashMap;
          import java.util.Map;

          /**
           * 최소 구현 MCP(Model Context Protocol) 서버.
           * JSON-RPC 2.0을 stdin/stdout으로 처리하며 initialize / tools/list / tools/call 지원.
           */
          public class McpServer {
              private static final ObjectMapper M = new ObjectMapper();
              private static final String PROTOCOL_VERSION = "2024-11-05";

              private final Map<String, Tool> tools = new LinkedHashMap<>();

              public McpServer() {
                  register(new EchoTool());
                  register(new TimeTool());
              }

              private void register(Tool t) { tools.put(t.name(), t); }

              public void run() throws Exception {
                  BufferedReader in = new BufferedReader(new InputStreamReader(System.in, StandardCharsets.UTF_8));
                  PrintStream out = new PrintStream(System.out, true, StandardCharsets.UTF_8);
                  String line;
                  while ((line = in.readLine()) != null) {
                      if (line.isBlank()) continue;
                      JsonNode req = M.readTree(line);
                      ObjectNode resp = handle(req);
                      if (resp != null) out.println(M.writeValueAsString(resp));
                  }
              }

              private ObjectNode handle(JsonNode req) {
                  String method = req.path("method").asText();
                  JsonNode id = req.get("id");
                  return switch (method) {
                      case "initialize" -> initialize(id);
                      case "tools/list" -> toolsList(id);
                      case "tools/call" -> toolsCall(id, req.path("params"));
                      default -> error(id, -32601, "Method not found: " + method);
                  };
              }

              private ObjectNode base(JsonNode id) {
                  ObjectNode n = M.createObjectNode();
                  n.put("jsonrpc", "2.0");
                  if (id != null) n.set("id", id); else n.putNull("id");
                  return n;
              }

              private ObjectNode initialize(JsonNode id) {
                  ObjectNode resp = base(id);
                  ObjectNode result = resp.putObject("result");
                  result.put("protocolVersion", PROTOCOL_VERSION);
                  result.putObject("capabilities").putObject("tools");
                  ObjectNode info = result.putObject("serverInfo");
                  info.put("name", "scaling-spork-mcp");
                  info.put("version", "1.0.0");
                  return resp;
              }

              private ObjectNode toolsList(JsonNode id) {
                  ObjectNode resp = base(id);
                  ObjectNode result = resp.putObject("result");
                  ArrayNode arr = result.putArray("tools");
                  for (Tool t : tools.values()) {
                      ObjectNode tn = arr.addObject();
                      tn.put("name", t.name());
                      tn.put("description", t.description());
                      ObjectNode schema = tn.putObject("inputSchema");
                      schema.put("type", "object");
                      schema.putObject("properties");
                  }
                  return resp;
              }

              private ObjectNode toolsCall(JsonNode id, JsonNode params) {
                  String name = params.path("name").asText();
                  Tool tool = tools.get(name);
                  if (tool == null) return error(id, -32602, "Unknown tool: " + name);
                  String text = tool.call(params.path("arguments"));
                  ObjectNode resp = base(id);
                  ObjectNode result = resp.putObject("result");
                  ObjectNode item = result.putArray("content").addObject();
                  item.put("type", "text");
                  item.put("text", text);
                  return resp;
              }

              private ObjectNode error(JsonNode id, int code, String message) {
                  ObjectNode resp = base(id);
                  ObjectNode err = resp.putObject("error");
                  err.put("code", code);
                  err.put("message", message);
                  return resp;
              }

              public static void main(String[] args) throws Exception {
                  new McpServer().run();
              }
          }
          EOF
          echo "MCP 서버 소스 4개 생성 완료"

      # ── 7. 리소스 파일 대량 생성 ──
      - name: Generate resource files
        run: |
          cat > src/main/resources/application.properties << 'EOF'
          app.name=scaling-spork
          app.version=1.0.0
          build.number=${{ github.run_number }}
          build.commit=${{ github.sha }}
          EOF

          cat > src/main/resources/config.yml << 'EOF'
          server:
            port: 8080
          logging:
            level: INFO
          EOF

          cat > src/main/resources/mcp-manifest.json << 'EOF'
          {
            "name": "scaling-spork-mcp",
            "version": "1.0.0",
            "protocolVersion": "2024-11-05",
            "transport": "stdio",
            "tools": [
              { "name": "echo", "description": "Echoes back the provided message." },
              { "name": "time", "description": "Returns the current server time." }
            ]
          }
          EOF

          cat > src/main/resources/banner.txt << 'EOF'
            ____            _ _                 ____                  _
           / ___|  ___ __ _| (_)_ __   __ _    / ___| _ __   ___  _ __| | __
           \___ \ / __/ _` | | | '_ \ / _` |   \___ \| '_ \ / _ \| '__| |/ /
            ___) | (_| (_| | | | | | | (_| |    ___) | |_) | (_) | |  |   <
           |____/ \___\__,_|_|_|_| |_|\__, |   |____/| .__/ \___/|_|  |_|\_\
                                      |___/          |_|
          EOF
          echo "리소스 4종 생성 완료" && ls -alF src/main/resources

      # ── 8. 테스트 코드 생성 ──
      - name: Generate test sources
        run: |
          cat > src/test/java/com/example/AppTest.java << 'EOF'
          package com.example;

          import org.junit.jupiter.api.Test;
          import static org.junit.jupiter.api.Assertions.assertNotNull;

          class AppTest {
              @Test
              void utilNowNotNull() {
                  assertNotNull(Util.now());
              }
          }
          EOF
          echo "AppTest.java 생성 완료"

      # ── 8-1. 컨테이너 파일 대량 생성 (Dockerfile / .dockerignore / docker-compose) ──
      - name: Generate container files
        run: |
          # 멀티스테이지 Dockerfile: 빌드 스테이지(Maven) + 런타임 스테이지(JRE)
          cat > Dockerfile << 'EOF'
          # syntax=docker/dockerfile:1

          # ===== 1단계: 빌드 =====
          FROM maven:3.9-eclipse-temurin-21 AS build
          WORKDIR /app
          # 의존성 캐시 최적화: pom.xml 먼저 복사
          COPY pom.xml .
          RUN mvn -B -q dependency:go-offline
          # 소스 복사 후 패키징
          COPY src ./src
          RUN mvn -B -q clean package -DskipTests

          # ===== 2단계: 런타임 =====
          FROM eclipse-temurin:21-jre AS runtime
          WORKDIR /app
          # 비루트 사용자로 실행 (보안)
          RUN useradd -r -u 1001 appuser
          COPY --from=build /app/target/scaling-spork.jar app.jar
          USER appuser
          # MCP 서버는 stdio 기반이므로 ENTRYPOINT로 직접 실행
          ENTRYPOINT ["java", "-cp", "app.jar", "com.example.mcp.McpServer"]
          EOF

          cat > .dockerignore << 'EOF'
          .git
          .github
          target
          downloaded
          *.md
          EOF

          cat > docker-compose.yml << 'EOF'
          services:
            mcp-server:
              build:
                context: .
                dockerfile: Dockerfile
              image: scaling-spork-mcp:latest
              container_name: scaling-spork-mcp
              # MCP는 stdio 통신이므로 표준입력 유지
              stdin_open: true
              tty: false
              restart: "no"
          EOF
          echo "컨테이너 파일 생성 완료:" && ls -alF Dockerfile .dockerignore docker-compose.yml

      # ── 9. 생성된 전체 구조 확인 ──
      - name: Show generated project tree
        run: find . -path ./.git -prune -o -type f -print | sort

      # ── 10. Maven 빌드 (컴파일 + 테스트 + 패키징) ──
      - name: Build with Maven
        run: mvn -B clean package --file pom.xml
        env:
          BUILD_NO: ${{ github.run_number }}

      # ── 11. shade 결과 검증 (module-info 제외 여부 확인) ──
      - name: Inspect shaded jar
        run: |
          echo "===== JAR 내 module-info 잔존 여부 (없어야 정상) ====="
          if unzip -l target/scaling-spork.jar | grep -i "module-info.class"; then
            echo "WARNING: module-info.class 가 남아있습니다."
          else
            echo "OK: module-info.class 가 제거되었습니다."
          fi
          echo "===== META-INF 목록 ====="
          unzip -l target/scaling-spork.jar | grep "META-INF/" || true
          echo "===== Main-Class 매니페스트 확인 ====="
          unzip -p target/scaling-spork.jar META-INF/MANIFEST.MF | grep -i "Main-Class" || true

      # ── 12. JAR 스모크 테스트 (App 실행) ──
      - name: Smoke test (run jar)
        run: java -jar target/scaling-spork.jar
        env:
          BUILD_NO: ${{ github.run_number }}

      # ── 12. MCP 서버 동작 검증 (initialize 요청을 stdin으로 주입) ──
      - name: Verify MCP server
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize"}' \
            | java -cp target/scaling-spork.jar com.example.mcp.McpServer
          echo "----"
          echo '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | java -cp target/scaling-spork.jar com.example.mcp.McpServer

      # ── 12-1. Docker 이미지 빌드 ──
      - name: Build Docker image
        run: |
          docker build -t scaling-spork-mcp:${{ github.sha }} -t scaling-spork-mcp:latest .
          docker images scaling-spork-mcp

      # ── 12-2. 컨테이너 동작 검증 (MCP 요청을 stdin으로 주입) ──
      - name: Verify container (MCP over stdio)
        run: |
          echo "===== initialize ====="
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize"}' \
            | docker run -i --rm scaling-spork-mcp:latest
          echo "===== tools/call (echo) ====="
          echo '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"echo","arguments":{"message":"from container"}}}' \
            | docker run -i --rm scaling-spork-mcp:latest

      # ── 12-3. 컨테이너 이미지를 tar로 저장 (적재용) ──
      - name: Export container image
        run: |
          mkdir -p image
          docker save scaling-spork-mcp:latest -o image/scaling-spork-mcp.tar
          ls -alh image

      # ── 13. 소스 파일 적재(업로드) ──
      - name: Upload source files
        id: upload_source
        uses: actions/upload-artifact@v6
        with:
          name: source-files
          path: src/main/java/**
          if-no-files-found: error
          retention-days: 30

      # ── 14. 리소스 파일 적재 ──
      - name: Upload resource files
        id: upload_resource
        uses: actions/upload-artifact@v6
        with:
          name: resource-files
          path: src/main/resources/**
          if-no-files-found: error
          retention-days: 30

      # ── 15. 빌드 산출물(JAR) 적재 ──
      - name: Upload build output
        id: upload_build
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          path: target/*.jar
          if-no-files-found: error
          retention-days: 30

      # ── 16. 프로젝트 전체 적재 (pom.xml + src 트리) ──
      - name: Upload full project
        id: upload_project
        uses: actions/upload-artifact@v6
        with:
          name: full-project
          path: |
            pom.xml
            src/**
          if-no-files-found: error
          retention-days: 30

      # ── 16-1. 컨테이너 정의 파일 적재 ──
      - name: Upload container files
        id: upload_container_files
        uses: actions/upload-artifact@v6
        with:
          name: container-files
          path: |
            Dockerfile
            .dockerignore
            docker-compose.yml
          if-no-files-found: error
          retention-days: 30

      # ── 16-2. 컨테이너 이미지(tar) 적재 ──
      - name: Upload container image
        id: upload_container_image
        uses: actions/upload-artifact@v6
        with:
          name: container-image
          path: image/scaling-spork-mcp.tar
          if-no-files-found: error
          retention-days: 30

      # ── 17. 공식 다운로드 주소를 실행 요약에 링크로 출력 ──
      - name: Publish download links
        run: |
          {
            echo "## 📦 아티팩트 다운로드 (공식 주소)"
            echo ""
            echo "| 아티팩트 | 다운로드 링크 |"
            echo "|----------|----------------|"
            echo "| 소스 파일 | [source-files](${{ steps.upload_source.outputs.artifact-url }}) |"
            echo "| 리소스 파일 | [resource-files](${{ steps.upload_resource.outputs.artifact-url }}) |"
            echo "| 빌드 산출물(JAR) | [build-output](${{ steps.upload_build.outputs.artifact-url }}) |"
            echo "| 전체 프로젝트 | [full-project](${{ steps.upload_project.outputs.artifact-url }}) |"
            echo "| 컨테이너 파일 | [container-files](${{ steps.upload_container_files.outputs.artifact-url }}) |"
            echo "| 컨테이너 이미지 | [container-image](${{ steps.upload_container_image.outputs.artifact-url }}) |"
            echo ""
            echo "> 링크는 GitHub 로그인 사용자만 열 수 있고, 보관 기간(30일) 동안 유효합니다."
          } >> "$GITHUB_STEP_SUMMARY"

      # ── 18. (검증) 올린 아티팩트 되받기 (최신 download v7) ──
      - name: Download artifacts back (verify)
        uses: actions/download-artifact@v7
        with:
          path: downloaded
      - name: Show downloaded structure
        run: ls -R downloaded
