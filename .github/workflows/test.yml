name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ── 1. 체크아웃 (최신 v6) ──
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── 2. JDK 설정 (최신 setup-java v5, Java 21 LTS) ──
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'   # Eclipse Temurin (권장)
          java-version: '21'        # 최신 LTS. 최신 기능 원하면 '25'
          cache: 'gradle'           # 'maven' 사용 시 변경

      # ── 3. 소스 파일 생성 ──
      - name: Generate source files
        run: |
          mkdir -p build/src
          cat > build/src/App.java << 'EOF'
          public class App {
              public static void main(String[] args) {
                  System.out.println("Hello from CI build #" + System.getenv("BUILD_NO"));
              }
          }
          EOF
          cat > build/src/Util.java << 'EOF'
          public class Util {
              public static String now() { return java.time.LocalDateTime.now().toString(); }
          }
          EOF
          echo "생성된 소스 파일:" && ls -alF build/src
        env:
          BUILD_NO: ${{ github.run_number }}

      # ── 4. 리소스 파일 생성 ──
      - name: Generate resource files
        run: |
          mkdir -p build/resources
          cat > build/resources/application.properties << 'EOF'
          app.name=scaling-spork
          app.version=1.0.0
          build.number=${{ github.run_number }}
          build.commit=${{ github.sha }}
          EOF
          cat > build/resources/config.yml << 'EOF'
          server:
            port: 8080
          logging:
            level: INFO
          EOF
          echo "생성된 리소스 파일:" && ls -alF build/resources

      # ── 5. 컴파일 (생성된 소스 검증) ──
      - name: Compile generated sources
        run: |
          mkdir -p build/classes
          javac -d build/classes build/src/*.java
          echo "컴파일 결과:" && ls -alF build/classes

      # ── 6. 소스 파일 업로드 (최신 v6) ──
      - name: Upload source files
        id: upload_source
        uses: actions/upload-artifact@v6
        with:
          name: source-files
          path: build/src/**
          if-no-files-found: error
          retention-days: 30

      # ── 7. 리소스 파일 업로드 ──
      - name: Upload resource files
        id: upload_resource
        uses: actions/upload-artifact@v6
        with:
          name: resource-files
          path: build/resources/**
          if-no-files-found: error
          retention-days: 30

      # ── 8. 빌드 산출물(클래스) 업로드 ──
      - name: Upload build output
        id: upload_build
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          path: build/classes/**
          if-no-files-found: error
          retention-days: 30

      # ── 9. 공식 다운로드 주소를 실행 요약에 링크로 출력 ──
      - name: Publish download links
        run: |
          {
            echo "## 📦 아티팩트 다운로드 (공식 주소)"
            echo ""
            echo "| 아티팩트 | 다운로드 링크 |"
            echo "|----------|----------------|"
            echo "| 소스 파일 | [source-files](${{ steps.upload_source.outputs.artifact-url }}) |"
            echo "| 리소스 파일 | [resource-files](${{ steps.upload_resource.outputs.artifact-url }}) |"
            echo "| 빌드 산출물 | [build-output](${{ steps.upload_build.outputs.artifact-url }}) |"
            echo ""
            echo "> 링크는 GitHub 로그인 사용자만 열 수 있고, 보관 기간(30일) 동안 유효합니다."
          } >> "$GITHUB_STEP_SUMMARY"

      # ── 10. (검증) 올린 아티팩트 되받기 (최신 download v7) ──
      - name: Download artifacts back (verify)
        uses: actions/download-artifact@v7
        with:
          path: downloaded
      - name: Show downloaded structure
        run: ls -R downloaded
